name: dit-bits-vs-quality
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch>=2.0.0
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8  # or 12.1 depending on your CUDA version
  - cudatoolkit=11.8   # match with pytorch-cuda
  
  # Core ML/AI packages
  - numpy>=1.21.0
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - pillow
  - opencv
  - imageio
  
  # Development tools
  - jupyter
  - ipython
  - tqdm
  - pathlib
  - logging
  
  # Additional utilities
  - requests
  - urllib3
  - certifi
  
  - pip:
    # Hugging Face ecosystem
    - diffusers>=0.30.0
    - transformers>=4.30.0
    - accelerate>=0.20.0
    - datasets
    - huggingface-hub
    
    